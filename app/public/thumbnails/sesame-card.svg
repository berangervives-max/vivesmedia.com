<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Fond blanc -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- ── LOGO SÉSAME INFORMATIQUE — version carrée centrée ── -->
  <!-- Cadre extérieur -->
  <rect x="240" y="60" width="320" height="320" fill="none" stroke="#000" stroke-width="5"/>

  <!-- "1987" en haut à droite dans le cadre -->
  <text x="530" y="115"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="42" font-weight="700" fill="#000"
        text-anchor="end">1987</text>

  <!-- "Sésame" en grand en bas du cadre -->
  <text x="253" y="328"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="900" fill="#000"
        text-anchor="start" letter-spacing="-1">Sésame</text>

  <!-- Double filet sous le texte -->
  <line x1="243" y1="340" x2="557" y2="340" stroke="#000" stroke-width="3"/>
  <line x1="243" y1="348" x2="557" y2="348" stroke="#000" stroke-width="1.5"/>

  <!-- "Informatique" en dessous du cadre -->
  <text x="240" y="415"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#000"
        text-anchor="start">Informatique</text>
</svg>
